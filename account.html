<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account — Momsies</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-count {
            background-color: var(--deep-terracotta);
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            margin-left: 5px;
            display: none;
        }

        .welcome-banner {
            background: linear-gradient(135deg, var(--blush), var(--cream));
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 32px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo">
                <h1>🌸 Momsies</h1>
                <p>nurture • comfort • joy</p>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="category.html">Packages</a></li>
                <li><a href="account.html">Account</a></li>
                <li><a href="cart.html">Cart 🛒 <span class="cart-count" id="cartCount">0</span></a></li>
            </ul>
            <button class="btn-primary" onclick="handleLogout()"><i class="fas fa-sign-out-alt"></i> Log Out</button>
        </div>
    </div>

    <div class="container" style="margin: 48px auto;">
        <div id="accountContent">
            <!-- Content will be loaded dynamically -->
        </div>
    </div>

    <footer>
        <div class="container footer-grid">
            <div><i class="fas fa-leaf"></i> Momsies — New Kingston, Jamaica<br>📧 hello@momsiesja.com</div>
            <div>© 2026 Momsies — with tenderness</div>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script>
        // Get logged in user
        function getLoggedInUser() {
            const user = localStorage.getItem('momsiesLoggedInUser');
            if (user) {
                return JSON.parse(user);
            }
            return null;
        }

        // Check if user is logged in
        function checkAuth() {
            const user = getLoggedInUser();
            if (!user) {
                // Redirect to login if not logged in
                window.location.href = 'login.html';
            }
            return user;
        }

        // Display account page with user's email
        function displayAccount() {
            const user = checkAuth();
            if (!user) return;

            // Get full user details from users array
            const users = JSON.parse(localStorage.getItem('momsiesUsers')) || [];
            const fullUser = users.find(u => u.email === user.email);

            const accountContainer = document.getElementById('accountContent');

            accountContainer.innerHTML = `
                <div class="welcome-banner">
                    <i class="fas fa-heart" style="font-size: 2rem; color: var(--deep-terracotta);"></i>
                    <h1 style="margin: 16px 0;">Welcome back, ${fullUser ? fullUser.name : user.name}! 🌸</h1>
                    <p>We're so happy to see you, mama.</p>
                </div>
                
                <div class="checkout-grid">
                    <div>
                        <div class="card">
                            <h3><i class="fas fa-user-circle"></i> Profile Information</h3>
                            <div class="form-group">
                                <label>Full Name</label>
                                <input type="text" id="profileName" value="${fullUser ? fullUser.name : user.name}" readonly style="background: var(--warm-gray);">
                            </div>
                            <div class="form-group">
                                <label>Email Address</label>
                                <input type="email" id="profileEmail" value="${user.email}" readonly style="background: var(--warm-gray);">
                            </div>
                            <div class="form-group">
                                <label>Member Since</label>
                                <input type="text" value="${fullUser && fullUser.joinDate ? fullUser.joinDate : 'April 2026'}" readonly style="background: var(--warm-gray);">
                            </div>
                            <button class="btn-secondary" onclick="editProfile()">Edit Profile</button>
                        </div>
                        
                        <div class="card" style="margin-top: 24px;">
                            <h3><i class="fas fa-map-marker-alt"></i> Saved Addresses</h3>
                            <p><strong>Default Shipping Address:</strong><br>
                            ${fullUser && fullUser.address ? fullUser.address : 'No address saved yet'}</p>
                            <button class="btn-outline" onclick="addAddress()">Add New Address</button>
                        </div>
                    </div>
                    
                    <div>
                        <div class="card">
                            <h3><i class="fas fa-shopping-bag"></i> Recent Orders</h3>
                            <div id="recentOrders">
                                <p style="text-align: center; color: #7e6a5e;">No orders yet.</p>
                                <p style="text-align: center;"><a href="category.html">🌸 Start shopping 🌸</a></p>
                            </div>
                        </div>
                        
                        <div class="card" style="margin-top: 24px;">
                            <h3><i class="fas fa-gem"></i> Loyalty Rewards</h3>
                            <p>You have <strong>250 points</strong> — JMD 250 off your next purchase!</p>
                            <button class="btn-secondary" onclick="alert('🎁 Loyalty rewards coming soon! You\'ll be able to redeem points at checkout.')">Redeem Now</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function editProfile() {
            const newName = prompt('Enter your new name:');
            if (newName && newName.trim()) {
                const user = getLoggedInUser();
                if (user) {
                    // Update in users array
                    const users = JSON.parse(localStorage.getItem('momsiesUsers')) || [];
                    const userIndex = users.findIndex(u => u.email === user.email);
                    if (userIndex !== -1) {
                        users[userIndex].name = newName.trim();
                        localStorage.setItem('momsiesUsers', JSON.stringify(users));
                    }
                    // Update logged in user
                    user.name = newName.trim();
                    localStorage.setItem('momsiesLoggedInUser', JSON.stringify(user));
                    alert('✅ Profile updated successfully!');
                    displayAccount();
                }
            }
        }

        function addAddress() {
            const newAddress = prompt('Enter your shipping address:');
            if (newAddress && newAddress.trim()) {
                const user = getLoggedInUser();
                if (user) {
                    const users = JSON.parse(localStorage.getItem('momsiesUsers')) || [];
                    const userIndex = users.findIndex(u => u.email === user.email);
                    if (userIndex !== -1) {
                        users[userIndex].address = newAddress.trim();
                        localStorage.setItem('momsiesUsers', JSON.stringify(users));
                        alert('✅ Address saved successfully!');
                        displayAccount();
                    }
                }
            }
        }

        function handleLogout() {
            localStorage.removeItem('momsiesLoggedInUser');
            alert('🌸 You have been logged out. Come back soon!');
            window.location.href = 'index.html';
        }

        function updateCartCountDisplay() {
            const cart = JSON.parse(localStorage.getItem('momsiesCart')) || [];
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            const cartCountSpan = document.getElementById('cartCount');
            if (totalItems > 0) {
                cartCountSpan.textContent = totalItems;
                cartCountSpan.style.display = 'inline-flex';
            } else {
                cartCountSpan.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            displayAccount();
            updateCartCountDisplay();
        });
    </script>
    <!-- AI Chatbot Script -->
    <script>
        // Momsies AI Chatbot - 24/7 Customer Support
        (function () {
            // Create chatbot HTML
            const chatbotHTML = `
            <div class="chat-button" id="chatButton">
                <i class="fas fa-comment-dots"></i>
            </div>
            <div class="chat-window" id="chatWindow">
                <div class="chat-header">
                    <h3><i class="fas fa-robot"></i> Momsie AI Assistant</h3>
                    <button class="close-chat" id="closeChat">✕</button>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message bot-message">
                        🌸 Hello Mama! I'm Momsie AI, your 24/7 virtual assistant.<br>
                        I can help you with:<br>
                        📦 Package details<br>
                        🚚 Shipping & delivery<br>
                        🔄 Returns & exchanges<br>
                        🎁 Customization options<br><br>
                        What can I help you with today?
                    </div>
                </div>
                <div class="quick-replies" id="quickReplies">
                    <button class="quick-reply-btn" data-question="What packages do you offer?">📦 Packages</button>
                    <button class="quick-reply-btn" data-question="How long does shipping take?">🚚 Shipping</button>
                    <button class="quick-reply-btn" data-question="What is your return policy?">🔄 Returns</button>
                    <button class="quick-reply-btn" data-question="Can I customize a package?">🎁 Customize</button>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" placeholder="Type your message..." autocomplete="off">
                    <button id="sendMessage"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
        `;

            // Add chatbot to page
            document.body.insertAdjacentHTML('beforeend', chatbotHTML);

            // Get elements
            const chatButton = document.getElementById('chatButton');
            const chatWindow = document.getElementById('chatWindow');
            const closeChat = document.getElementById('closeChat');
            const chatInput = document.getElementById('chatInput');
            const sendBtn = document.getElementById('sendMessage');
            const chatMessages = document.getElementById('chatMessages');

            // AI Response Database
            const responses = {
                // Greetings
                'hello': '🌸 Hello Mama! Welcome to Momsies. How can I support you today?',
                'hi': '🌸 Hi there! I\'m so happy you\'re here. Need help finding something?',
                'hey': '🌸 Hey Mama! What can I do for you today?',

                // Packages
                'what packages do you offer': '🌸 We offer 5 main care packages:\n📦 Pregnancy Glow - JMD 4,500\n🏥 Hospital Bag Essentials - JMD 3,800\n💖 Postpartum Recovery - JMD 5,200\n👶 Newborn Nest - JMD 6,100\n🎁 Custom Bundle - From JMD 3,800\n\nWhich one interests you?',
                'tell me about packages': '🌸 Our packages are curated for each stage of motherhood. We have Pregnancy, Hospital Bag, Postpartum, Newborn, and Custom bundles. Would you like details on a specific one?',
                'pregnancy package': '🌸 The Pregnancy Glow package includes skincare, comfort goods, and everyday essentials for expecting mamas. Price: JMD 4,500. Want me to help you add it to cart?',
                'postpartum package': '🌸 The Postpartum Recovery package includes healing sprays, sitz bath, nursing pads, belly balm, and a journal. Price: JMD 5,200. It\'s our best seller!',
                'newborn package': '🌸 The Newborn Nest includes diapers, wipes, organic cotton clothing, and feeding supplies. Price: JMD 6,100. Perfect for baby\'s first months!',
                'hospital bag': '🌸 The Hospital Bag Essentials package has everything you need for labor and delivery day. Price: JMD 3,800.',
                'custom bundle': '🌸 You can build your own package starting from JMD 3,800! Just click "Custom Bundle" on our shop page and pick the items you need.',

                // Shipping
                'how long does shipping take': '🚚 We process orders within 24-48 hours. Delivery takes 2-4 business days across Jamaica. You\'ll get a tracking link via email!',
                'shipping cost': '🚚 Shipping is JMD 500 flat rate island-wide. Orders over JMD 7,000 get FREE shipping!',
                'delivery': '🚚 We partner with Tara and other reliable couriers for door-to-door delivery across all parishes in Jamaica.',
                'free shipping': '🎉 Yes! Spend JMD 7,000 or more and shipping is FREE!',

                // Returns
                'return policy': '🔄 Due to the nature of our products, we don\'t offer refunds after delivery. But we do offer exchanges or store credit for damaged or incorrect items within 14 days.',
                'exchange': '🔄 For exchanges, please email us at hello@momsiesja.com within 14 days with photos of the item. We\'ll arrange store credit or replacement.',
                'damaged item': '😟 Oh no! If your package arrived damaged, please contact us within 48 hours with photos. We\'ll send a replacement right away!',

                // Customization
                'can i customize': '🎁 Absolutely! Our "Custom Bundle" option lets you pick exactly what you need. Just visit our shop and click "Build Yours"!',
                'personalized': '🎁 Yes! You can add a handwritten gift note at checkout. Perfect for baby showers or push presents!',

                // Account
                'create account': '📝 Click "Sign In" at the top right, then select "Create Account". You\'ll need a valid email address with @ symbol.',
                'login': '🔐 Click the "Sign In" button in the top right corner. Use the email and password you registered with.',
                'forgot password': '📧 No worries! Email us at hello@momsiesja.com and we\'ll help you reset your password.',

                // Payment
                'payment methods': '💳 We accept Credit Cards, PayPal, Bank Transfers, and Cash on Delivery. All payments are secure and encrypted!',
                'secure payment': '🔒 Yes! Our checkout is fully encrypted and secure. Your payment information is safe with us.',

                // General
                'thank you': '🌸 You\'re so welcome, Mama! We\'re honored to support you. 💕',
                'thanks': '🌸 Always here for you! Have a beautiful day, Mama!',
                'bye': '🌸 Bye for now, Mama! Come back anytime. Sending you love! 💕',
                'help': '🌸 I can help with:\n• Package details\n• Shipping & delivery\n• Returns & exchanges\n• Customization\n• Account questions\n\nWhat would you like to know?',
            };

            // Default response
            const defaultResponse = '🌸 I\'m still learning, Mama! For specific questions, please email hello@momsiesja.com or call +1 (876) 555-MAMA. Our human team is here for you 9am-6pm! 💕';

            // Function to get AI response
            function getResponse(userMessage) {
                const lowerMsg = userMessage.toLowerCase().trim();

                // Check for exact matches first
                for (const [key, response] of Object.entries(responses)) {
                    if (lowerMsg.includes(key)) {
                        return response;
                    }
                }

                // Check for keywords
                if (lowerMsg.includes('price') || lowerMsg.includes('cost')) {
                    return '💰 Our packages range from JMD 3,800 to JMD 6,100. Which package are you interested in?';
                }
                if (lowerMsg.includes('discount') || lowerMsg.includes('sale')) {
                    return '🎉 We offer seasonal promotions and first-time buyer discounts! Sign up for our newsletter to stay updated.';
                }
                if (lowerMsg.includes('gift')) {
                    return '🎁 Our care packages make wonderful baby shower gifts! You can add a personalized note at checkout for free.';
                }
                if (lowerMsg.includes('track')) {
                    return '📦 You\'ll receive a tracking link via email once your order ships. You can also check your order status in your Account dashboard.';
                }

                return defaultResponse;
            }

            // Add message to chat
            function addMessage(text, isUser) {
                const messageDiv = document.createElement('div');
                messageDiv.className = `message ${isUser ? 'user-message' : 'bot-message'}`;
                messageDiv.innerHTML = text.replace(/\n/g, '<br>');
                chatMessages.appendChild(messageDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // Show typing indicator
            function showTyping() {
                const typingDiv = document.createElement('div');
                typingDiv.className = 'typing-indicator';
                typingDiv.id = 'typingIndicator';
                typingDiv.innerHTML = '<span></span><span></span><span></span>';
                chatMessages.appendChild(typingDiv);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            // Hide typing indicator
            function hideTyping() {
                const typing = document.getElementById('typingIndicator');
                if (typing) typing.remove();
            }

            // Send user message and get response
            function sendUserMessage() {
                const message = chatInput.value.trim();
                if (!message) return;

                addMessage(message, true);
                chatInput.value = '';

                showTyping();

                setTimeout(() => {
                    hideTyping();
                    const response = getResponse(message);
                    addMessage(response, false);
                }, 800);
            }

            // Quick reply handler
            function handleQuickReply(question) {
                addMessage(question, true);
                showTyping();
                setTimeout(() => {
                    hideTyping();
                    const response = getResponse(question);
                    addMessage(response, false);
                }, 600);
            }

            // Event listeners
            chatButton.addEventListener('click', () => {
                chatWindow.style.display = 'flex';
                chatButton.style.display = 'none';
                chatInput.focus();
            });

            closeChat.addEventListener('click', () => {
                chatWindow.style.display = 'none';
                chatButton.style.display = 'flex';
            });

            sendBtn.addEventListener('click', sendUserMessage);
            chatInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendUserMessage();
            });

            // Quick reply buttons
            document.querySelectorAll('.quick-reply-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const question = btn.getAttribute('data-question');
                    handleQuickReply(question);
                });
            });

            // Auto-open chat after 10 seconds on first visit
            setTimeout(() => {
                if (!localStorage.getItem('chatOpened')) {
                    localStorage.setItem('chatOpened', 'true');
                    chatWindow.style.display = 'flex';
                    chatButton.style.display = 'none';
                }
            }, 10000);
        })();
    </script>
</body>

</html>
