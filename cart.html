<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart — Momsies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body { display: flex; flex-direction: column; min-height: 100vh; font-family: 'Inter', sans-serif; background: #fefaf5; }
        .cart-count { background-color: #b45f4b; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 5px; display: none; }
        .user-greeting { display: flex; align-items: center; gap: 12px; }
        .user-name { font-weight: 500; color: #b45f4b; }
        .empty-cart { text-align: center; padding: 60px 20px; background: white; border-radius: 32px; margin: 20px 0; }
        .empty-cart i { font-size: 4rem; color: #d48f7b; margin-bottom: 20px; }
        .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 16px; background: #f5ede6; }
        .quantity-input { width: 70px; padding: 8px; border-radius: 20px; border: 1px solid #f7c9c0; text-align: center; }
        .cart-table { width: 100%; border-collapse: collapse; background: white; border-radius: 28px; overflow: hidden; margin: 20px 0; }
        .cart-table th, .cart-table td { padding: 16px; text-align: left; border-bottom: 1px solid #f7c9c0; }
        .cart-table th { background: #f5ede6; color: #b45f4b; font-weight: 600; }
        .cart-summary { background: #f5ede6; border-radius: 28px; padding: 24px; margin-top: 24px; margin-bottom: 40px; }
        .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; flex: 1; }
        footer { background: #2d2a24; color: #e6dbd2; padding: 48px 0 24px; border-radius: 40px 40px 0 0; margin-top: auto; }
        .footer-grid { display: flex; flex-wrap: wrap; justify-content: space-between; gap: 32px; }
        .navbar { background: rgba(255, 249, 242, 0.96); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; padding: 16px 0; border-bottom: 1px solid #f7c9c0; }
        .nav-flex { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
        .logo h1 { font-size: 1.9rem; color: #b45f4b; }
        .nav-links { display: flex; gap: 28px; list-style: none; flex-wrap: wrap; }
        .nav-links a { text-decoration: none; color: #2d2a24; font-weight: 500; }
        .btn-primary { background: #d48f7b; color: white; padding: 12px 28px; border-radius: 40px; border: none; cursor: pointer; font-weight: 600; }
        .btn-outline { background: transparent; border: 1px solid #b45f4b; color: #b45f4b; padding: 8px 20px; border-radius: 40px; cursor: pointer; }
        .section-title { text-align: center; font-family: 'Playfair Display', serif; font-size: 2.3rem; color: #b45f4b; margin: 30px 0 20px; }
        .free-shipping-badge { background: #b0bea9; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo"><h1>🌸 Momsies</h1><p>nurture • comfort • joy</p></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="category.html">Packages</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="cart.html">Cart 🛒 <span class="cart-count" id="cartCount">0</span></a></li>
                <li><a href="account.html">Account</a></li>
                <li><a href="legal.html">Legal</a></li>
            </ul>
            <div id="authSection"></div>
        </div>
    </div>

    <div class="container">
        <h1 class="section-title">🛒 Your Shopping Cart</h1>
        <div id="cartContainer"></div>
    </div>

    <footer>
        <div class="container footer-grid">
            <div><i class="fas fa-leaf"></i> Momsies — New Kingston, Jamaica<br>📧 hello@momsiesja.com</div>
            <div><i class="fab fa-instagram"></i> @momsies_ja</div>
            <div><a href="legal.html" style="color: #e6dbd2;">Terms & Privacy</a> | © 2026 Momsies — with tenderness</div>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script>
        const SHIPPING_COST = 500;
        const FREE_SHIPPING_THRESHOLD = 7000;
        
        function displayCart() {
            const cartContainer = document.getElementById('cartContainer');
            let cart = [];
            const savedCart = localStorage.getItem('momsiesCart');
            if (savedCart) { cart = JSON.parse(savedCart); }
            
            if (!cart || cart.length === 0) {
                cartContainer.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-bag"></i><h3>Your cart is empty</h3><p>Looks like you haven't added any packages yet.</p><a href="category.html"><button class="btn-primary" style="margin-top: 20px;">🌸 Shop Our Packages 🌸</button></a></div>`;
                updateCartCount();
                return;
            }
            
            let html = `<table class="cart-table"><thead><tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr></thead><tbody>`;
            let total = 0;
            
            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const subtotal = item.price * item.quantity;
                total += subtotal;
                html += `<tr>
                    <td style="display: flex; align-items: center; gap: 15px;"><img src="${item.image}" class="cart-item-img" onerror="this.src='https://placehold.co/100x100/f7c9c0/b45f4b?text=Product'"><strong>${item.name}</strong></td>
                    <td>JMD ${item.price.toLocaleString()}</td>
                    <td><input type="number" value="${item.quantity}" min="1" class="quantity-input" onchange="updateQty('${item.id}', this.value)"></td>
                    <td>JMD ${subtotal.toLocaleString()}</td>
                    <td><button class="btn-outline" onclick="removeItem('${item.id}')">Remove</button></td>
                </tr>`;
            }
            
            const shippingAmount = total >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_COST;
            const grandTotal = total + shippingAmount;
            
            html += `</tbody></table>
                <div class="cart-summary">
                    <h3>Order Summary</h3>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><span>Subtotal:</span><span>JMD ${total.toLocaleString()}</span></div>
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;"><span>Shipping:</span><span>${shippingAmount === 0 ? '<span style="color: #b0bea9;">FREE</span>' : 'JMD ' + shippingAmount.toLocaleString()}</span></div>
                    ${total < FREE_SHIPPING_THRESHOLD ? '<p style="font-size: 0.85rem; color: #d48f7b; margin-bottom: 12px; background: #fff; padding: 8px 12px; border-radius: 20px;">✨ Add JMD ' + (FREE_SHIPPING_THRESHOLD - total).toLocaleString() + ' more for FREE shipping ✨</p>' : '<p style="font-size: 0.85rem; color: #b0bea9; margin-bottom: 12px; background: #fff; padding: 8px 12px; border-radius: 20px;">🎉 You qualify for FREE shipping! 🎉</p>'}
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px; border-top: 1px solid #f7c9c0; padding-top: 12px;"><span><strong>Total:</strong></span><span><strong>JMD ${grandTotal.toLocaleString()}</strong></span></div>
                    <a href="checkout.html"><button class="btn-primary" style="width: 100%; margin-top: 16px;">Proceed to Checkout →</button></a>
                    <button onclick="clearAllCart()" class="btn-outline" style="width: 100%; margin-top: 12px;">Clear Cart</button>
                    <a href="category.html" style="display: block; text-align: center; margin-top: 16px;">← Continue Shopping</a>
                </div>`;
            
            cartContainer.innerHTML = html;
            updateCartCount();
        }
        
        function removeItem(id) { let cart = JSON.parse(localStorage.getItem('momsiesCart')) || []; cart = cart.filter(i => i.id !== id); localStorage.setItem('momsiesCart', JSON.stringify(cart)); displayCart(); }
        function updateQty(id, newQty) { let cart = JSON.parse(localStorage.getItem('momsiesCart')) || []; const item = cart.find(i => i.id === id); if (item) { item.quantity = parseInt(newQty); localStorage.setItem('momsiesCart', JSON.stringify(cart)); displayCart(); } }
        function clearAllCart() { localStorage.removeItem('momsiesCart'); displayCart(); }
        
        function updateCartCount() { 
            const cart = JSON.parse(localStorage.getItem('momsiesCart')) || []; 
            const total = cart.reduce((s, i) => s + i.quantity, 0); 
            const span = document.getElementById('cartCount'); 
            if (span) { 
                if (total > 0) { 
                    span.textContent = total; 
                    span.style.display = 'inline-flex'; 
                } else { 
                    span.style.display = 'none'; 
                } 
            } 
        }
        
        function updateAuthSection() {
            const authSection = document.getElementById('authSection');
            if (!authSection) return;
            const loggedInUser = localStorage.getItem('momsiesLoggedInUser');
            if (loggedInUser) {
                const user = JSON.parse(loggedInUser);
                authSection.innerHTML = '<div class="user-greeting"><span class="user-name"><i class="fas fa-heart"></i> Hello, ' + user.name + '!</span><button class="btn-outline" onclick="handleLogout()" style="padding: 6px 16px;">Sign Out</button></div>';
            } else {
                authSection.innerHTML = '<a href="login.html"><button class="btn-primary"><i class="fas fa-heart"></i> Sign In</button></a>';
            }
        }
        
        function handleLogout() { localStorage.removeItem('momsiesLoggedInUser'); alert('🌸 Logged out'); updateAuthSection(); displayCart(); }
        
        document.addEventListener('DOMContentLoaded', function() { updateAuthSection(); displayCart(); });
    </script>
    
    <!-- YOUR EXISTING CHATBOT SCRIPT GOES HERE -->
</body>
</html>
