<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Checkout — Momsies</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-count { background-color: #b45f4b; color: white; border-radius: 50%; padding: 2px 8px; font-size: 12px; margin-left: 5px; display: none; }
        .user-greeting { display: flex; align-items: center; gap: 12px; }
        .user-name { font-weight: 500; color: #b45f4b; }
        .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 500; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px 16px; border: 1px solid #f7c9c0; border-radius: 24px; font-family: inherit; }
        .order-summary { background: #f5ede6; border-radius: 28px; padding: 24px; position: sticky; top: 100px; }
        .order-item { display: flex; justify-content: space-between; margin-bottom: 12px; }
        .card { background: white; border-radius: 28px; padding: 32px; box-shadow: 0 5px 20px rgba(0,0,0,0.03); border: 1px solid #f7c9c0; margin-bottom: 24px; }
        .free-shipping-badge { background: #b0bea9; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; margin-left: 10px; }
        @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="navbar">
        <div class="container nav-flex">
            <div class="logo"><h1>🌸 Momsies</h1><p>nurture • comfort • joy</p></div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="category.html">Packages</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="cart.html">Cart 🛒 <span class="cart-count" id="cartCount">0</span></a></li>
                <li><a href="account.html">Account</a></li>
                <li><a href="legal.html">Legal</a></li>
            </ul>
            <div id="authSection"></div>
        </div>
    </div>

    <div class="container" style="margin: 48px auto;">
        <h1 class="section-title">Secure Checkout</h1>
        
        <div class="checkout-grid" id="checkoutGrid">
            <div>
                <div class="card">
                    <h3>Shipping Information</h3>
                    <div class="form-group"><label>Full Name</label><input type="text" id="fullName" placeholder="Mama Johnson"></div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="mama@example.com"></div>
                    <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+1 876 555 1234"></div>
                    <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="Kingston, Jamaica"></div>
                    <div class="form-group"><label>Delivery Instructions (optional)</label><textarea rows="2" placeholder="Gate code, landmark, etc."></textarea></div>
                </div>
                
                <div class="card">
                    <h3>Payment Method</h3>
                    <div class="form-group">
                        <select id="paymentMethod">
                            <option>Credit Card</option>
                            <option>PayPal</option>
                            <option>Bank Transfer</option>
                            <option>Cash on Delivery</option>
                        </select>
                    </div>
                    <div class="form-group"><label>Card Number</label><input type="text" placeholder="**** **** **** 1234"></div>
                    <div style="display: flex; gap: 16px;">
                        <div class="form-group" style="flex:1"><label>Expiry</label><input placeholder="MM/YY"></div>
                        <div class="form-group" style="flex:1"><label>CVV</label><input placeholder="123"></div>
                    </div>
                </div>
                
                <button class="btn-primary" style="width: 100%;" onclick="placeOrder()"><i class="fas fa-lock"></i> Place Order →</button>
            </div>
            
            <div class="order-summary" id="orderSummary">
                <h3>Your Order</h3>
                <div id="orderItems"></div>
                <div id="orderTotal"></div>
            </div>
        </div>
    </div>

    <footer>
        <div class="container footer-grid">
            <div><i class="fas fa-leaf"></i> Momsies — New Kingston, Jamaica<br>📧 hello@momsiesja.com</div>
            <div><i class="fab fa-instagram"></i> @momsies_ja</div>
            <div><a href="legal.html" style="color: #e6dbd2;">Terms & Privacy</a> | © 2026 Momsies — with tenderness</div>
        </div>
    </footer>

    <script src="cart.js"></script>
    <script>
        const SHIPPING_COST = 500;
        const FREE_SHIPPING_THRESHOLD = 7000;
        
        function loadCheckout() {
            const cart = JSON.parse(localStorage.getItem('momsiesCart')) || [];
            const orderItemsDiv = document.getElementById('orderItems');
            const orderTotalDiv = document.getElementById('orderTotal');
            
            if (!cart || cart.length === 0) {
                window.location.href = 'cart.html';
                return;
            }
            
            let itemsHtml = '';
            let subtotal = 0;
            
            for (let i = 0; i < cart.length; i++) {
                const item = cart[i];
                const itemTotal = item.price * item.quantity;
                subtotal += itemTotal;
                itemsHtml += `<div class="order-item"><span>${item.name} x${item.quantity}</span><span>JMD ${itemTotal.toLocaleString()}</span></div>`;
            }
            
            const shippingAmount = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_COST;
            const grandTotal = subtotal + shippingAmount;
            
            orderItemsDiv.innerHTML = itemsHtml;
            orderTotalDiv.innerHTML = `
                <hr style="margin: 16px 0;">
                <div class="order-item"><span>Subtotal:</span><span>JMD ${subtotal.toLocaleString()}</span></div>
                <div class="order-item"><span>Shipping:</span><span>${shippingAmount === 0 ? '<span style="color: #b0bea9;">FREE</span>' : 'JMD ' + shippingAmount.toLocaleString()}</span></div>
                <div class="order-item" style="border-top: 1px solid #f7c9c0; padding-top: 12px;"><strong>Total:</strong><strong>JMD ${grandTotal.toLocaleString()}</strong></div>
                ${subtotal < FREE_SHIPPING_THRESHOLD ? '<p style="font-size: 0.75rem; color: #d48f7b; margin-top: 12px;">✨ Add JMD ' + (FREE_SHIPPING_THRESHOLD - subtotal).toLocaleString() + ' more for FREE shipping ✨</p>' : '<p style="font-size: 0.75rem; color: #b0bea9; margin-top: 12px;">🎉 You qualified for FREE shipping! 🎉</p>'}
                <p style="font-size: 0.7rem; margin-top: 16px;"><i class="fas fa-shield-alt"></i> Secure payment</p>
            `;
            
            updateCartCount();
        }
        
        function placeOrder() {
            const name = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const address = document.getElementById('address').value;
            
            if (!name || !email || !address) {
                alert('🌸 Please fill in all shipping information before placing your order, Mama!');
                return;
            }
            
            if (!email.includes('@')) {
                alert('🌸 Please enter a valid email address with @');
                return;
            }
            
            const cart = JSON.parse(localStorage.getItem('momsiesCart')) || [];
            let subtotal = 0;
            for (let i = 0; i < cart.length; i++) {
                subtotal += cart[i].price * cart[i].quantity;
            }
            const shippingAmount = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_COST;
            
            const order = {
                orderNumber: 'MOMS-' + Math.floor(Math.random() * 10000),
                date: new Date().toLocaleDateString(),
                items: cart,
                subtotal: subtotal,
                shipping: shippingAmount,
                total: subtotal + shippingAmount,
                customer: { name: name, email: email, address: address }
            };
            
            localStorage.setItem('momsiesLastOrder', JSON.stringify(order));
            localStorage.removeItem('momsiesCart');
            
            alert(`🌸 Order placed successfully, ${name}!\n\nOrder #: ${order.orderNumber}\nTotal: JMD ${order.total.toLocaleString()}\n\nYou will receive a confirmation email at ${email}`);
            window.location.href = 'thank-you.html';
        }
        
        function updateCartCount() {
            const cart = JSON.parse(localStorage.getItem('momsiesCart')) || [];
            const total = cart.reduce((s, i) => s + i.quantity, 0);
            const span = document.getElementById('cartCount');
            if (span) {
                if (total > 0) {
                    span.textContent = total;
                    span.style.display = 'inline-flex';
                } else {
                    span.style.display = 'none';
                }
            }
        }
        
        function updateAuthSection() {
            const authSection = document.getElementById('authSection');
            if (!authSection) return;
            const loggedInUser = localStorage.getItem('momsiesLoggedInUser');
            if (loggedInUser) {
                const user = JSON.parse(loggedInUser);
                authSection.innerHTML = '<div class="user-greeting"><span class="user-name"><i class="fas fa-heart"></i> Hello, ' + user.name + '!</span><button class="btn-outline" onclick="handleLogout()" style="padding: 6px 16px;">Sign Out</button></div>';
            } else {
                authSection.innerHTML = '<a href="login.html"><button class="btn-primary"><i class="fas fa-heart"></i> Sign In</button></a>';
            }
        }
        
        function handleLogout() { localStorage.removeItem('momsiesLoggedInUser'); alert('🌸 Logged out'); updateAuthSection(); loadCheckout(); }
        
        document.addEventListener('DOMContentLoaded', function() { updateAuthSection(); loadCheckout(); });
    </script>
    
    <!-- YOUR EXISTING CHATBOT SCRIPT GOES HERE -->
</body>
</html>
